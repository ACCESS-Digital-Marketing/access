<!DOCTYPE html>

<title>Ads Results - ACCESS</title>

<meta name="robots" content="index, follow">
<style>

body{
margin:0;
background:#0a0a0a;
font-family:Arial;
color:white;
}


header{
text-align:center;
padding:20px;
}

header img{
width:120px;
border-radius:15px;
box-shadow:0 0 15px #0d6efd;
}


h1{
text-align:center;
color:#0d6efd;
letter-spacing:3px;
margin-bottom:30px;
}


.gallery{
display:grid;
grid-template-columns:repeat(5, 1fr);
gap:10px;
padding:20px;
}


.gallery img{
width:100%;
height:220px;
object-fit:contain;
background:#111;
border-radius:12px;
box-shadow:0 0 10px rgba(13,110,253,0.4);
transition:.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 25px #0d6efd;
}


@media(max-width:1200px){
.gallery{grid-template-columns:repeat(3, 1fr);}
}

@media(max-width:700px){
.gallery{grid-template-columns:repeat(2, 1fr);}
}

@media(max-width:500px){
.gallery{grid-template-columns:repeat(1, 1fr);}
}


#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
box-shadow:0 0 20px #000;
}


#closeBtn{
position:absolute;
top:20px;
right:30px;
font-size:45px;
color:white;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

#closeBtn:hover{
color:red;
transform:scale(1.2);
}

</style>
</head>
